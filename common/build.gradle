plugins {
    id 'multiloader-common'
    id 'net.neoforged.moddev'
}

neoForge {
    neoFormVersion = neo_form_version
    parchment {
        minecraftVersion = parchment_minecraft
        mappingsVersion = parchment_version
    }
}

// ModDev creates extra variants without capabilities — patch them all
afterEvaluate {
    configurations.each { config ->
        if (config.canBeConsumed) {
            try { config.outgoing.capability("$group:$mod_id:$version") } catch (ignored) {}
        }
    }
}

repositories {
    // Local flat-dir repo pointing at the built Charta jars
    flatDir {
        dirs '../common/build/libs',
             '../fabric/build/libs',
             '../neoforge/build/libs'
    }
}

dependencies {
    compileOnly group: 'org.spongepowered', name: 'mixin', version: '0.8.5'
    compileOnly group: 'io.github.llamalad7', name: 'mixinextras-common', version: '0.3.5'
    annotationProcessor group: 'io.github.llamalad7', name: 'mixinextras-common', version: '0.3.5'

    // Charta common jar — used for compilation on Fabric.
    // NeoForge uses charta-neoforge jar instead (see neoforge/build.gradle).
    // This jar is NOT added to neoforge compile classpath to avoid duplicate package conflicts.
    compileOnly files(rootProject.file(charta_jar))
}

// Ensure Charta common jar is up to date before compiling
tasks.named('compileJava') {
    inputs.file(rootProject.file(charta_jar))
    // If you change the base mod, run: ./gradlew :common:jar :neoforge:jar in the base mod folder first
}

configurations {
    commonJava {
        canBeResolved = false
        canBeConsumed = true
    }
    commonResources {
        canBeResolved = false
        canBeConsumed = true
    }
}

artifacts {
    commonJava sourceSets.main.java.sourceDirectories.singleFile
    commonResources sourceSets.main.resources.sourceDirectories.singleFile
}
